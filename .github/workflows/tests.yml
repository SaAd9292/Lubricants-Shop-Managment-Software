name: tests

on:
  push:
  pull_request:

jobs:
  headless-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes
      - name: Static checks (compile + pyflakes)
        run: |
          python -m compileall -q lubripos main.py tests
          python -m pyflakes lubripos main.py
      - name: Run headless test suites
        run: |
          export LUBRIPOS_HOME="$(mktemp -d)"
          fail=0
          for t in tests/test_*.py; do
            echo "== $t =="
            python "$t" || fail=1
          done
          exit $fail
